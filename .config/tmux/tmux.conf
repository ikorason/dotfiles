# Use Ctrl+a as the tmux prefix (leader) key
unbind C-b             # Unbind the default prefix
set -g prefix C-a      # Set new prefix to Ctrl+a
bind C-a send-prefix   # Allow sending Ctrl+a to applications inside tmux

# reload configuration
bind r run "sh -c '\"\$TMUX_PROGRAM\" \${TMUX_SOCKET:+-S \"\$TMUX_SOCKET\"} source \"\$TMUX_CONF\"'" \; display "#{TMUX_CONF} sourced"

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1

# split panes using | and -
bind | split-window -h   # Ctrl+a |  → split horizontally
bind - split-window -v   # Ctrl+a -  → split vertically

# Shift Alt vim keys to switch windows
bind -n M-H previous-window
bind -n M-L next-window

# find session
bind C-f command-prompt -p find-session 'switch-client -t %%'

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

# tmux-plugins/tmux-prefix-highlight support
set -g @prefix_highlight_output_prefix "#[fg=#e0af68]#[bg=#1f2335]#[fg=#1f2335]#[bg=#e0af68]"
set -g @prefix_highlight_output_suffix ""

run '~/.tmux/plugins/tpm/tpm'
